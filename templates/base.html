<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #f4f6fb;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #4f46e5, #7c3aed);
            padding: 30px 20px;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            margin-bottom: 40px;
            text-align: center;
        }

        .sidebar a {
            text-decoration: none;
            color: white;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 40px;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        /* CARDS */
        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        th {
            background: #4f46e5;
            color: white;
            padding: 14px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f1f3ff;
        }

        /* BUTTONS */
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4338ca;
            transform: scale(1.05);
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
        }

    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>📦 Smart Store</h2>

        <a href="/">🏠 Dashboard</a>
        <a href="/products">📋 Products</a>
        <a href="/create_bill">🧾 Create Bill</a>
        <a href="/sales">📊 Sales</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
